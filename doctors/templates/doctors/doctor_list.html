<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors</title>
</head>
<body>
    <h1>Our Doctors</h1>
    {% for doctor in doctors%}
        <div>
            <h3><a href="/doctors/{{doctor.pk}}/">Dr. {{doctor.name }}</a></h3>
            <p>Specialty: {{ doctor.specialty.name }}</p>
            <p> Shift :{{ doctor.get_shift_display }}</p>
        </div>
    {% empty %}
        <p>No doctors available.</p>
    {% endfor %}
</body>
</html>
